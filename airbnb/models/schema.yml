models:
    - name: dim_listings_cleansed   
      columns:
        - name: listing_id
          tests:
            - not_null
            - unique

        - name: host_id
          tests:
            - not_null
            - relationships:
                arguments:
                  to: ref('dim_hosts_cleansed')
                  field: host_id
        - name: room_type
          tests:
            - not_null
            - accepted_values:
                arguments:
                  values: ['Entire home/apt', 'Private room', 'Shared room']

    - name: dim_hosts_cleansed
      columns:
        - name: host_id
          tests:
            - not_null
            - unique
        - name: host_name
          tests:
            - not_null
        - name: is_superhost
          tests:
            - accepted_values:
                arguments:
                 values: ['t', 'f']
    - name: fct_reviews
      columns:
        - name: listing_id
          tests: 
            - not_null
            - relationships: 
                 arguments:
                  to: ref('dim_listings_cleansed')
                  field: listing_id
        - name: reviewer_name
          tests:
            - not_null
        - name: review_sentiment
          tests:
            - accepted_values:
                arguments:
                  values: ['negative', 'positive', 'neutral']
    - name: dim_hosts_cleansed
      config:
        contract:
          enforced: true
      columns:
        - name: host_id
          data_type: integer 
        - name: host_name
          data_type: string
        - name: is_superhost
          data_type: string
        - name: updated_at
          data_type: timestamp
        - name: created_at
          data_type: timestamp