models:
    - name: dim_listings_cleansed
      description: Cleansed Airbnb listings table.
      tests: 
      - min_row_count:
          arguments:
            min_row_count: 1000
            config:
              severity: warn
      columns:
        - name: listing_id
          description: Primary key for lisitngs
          tests:
            - not_null
            - unique

        - name: host_id
          description: The hostid ref the host table
          tests:
            - not_null
            - relationships:
                arguments:
                  to: ref('dim_hosts_cleansed')
                  field: host_id
        - name: room_type
          description: Type of the apartment / room
          tests:
            - not_null
            - accepted_values:
                arguments:
                  values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']

        - name: minimum_nights
          description: '{{ doc("dim_listings_cleansed_min_nights") }}'
          tests:
            - positive_values 

    - name: dim_hosts_cleansed
      config:
        contract:
          enforced: true
      constraints:
        - type: primary_key
          columns: [host_id]     
      columns:
        - name: host_id
          data_type: integer
          constraints:
            - type: not_null
            - type: unique
          tests:
            - not_null
            - unique

        - name: host_name
          data_type: string
          constraints:
            - type: not_null        
          tests:
            - not_null
        - name: is_superhost
          data_type: string        
          tests:
            - accepted_values:
                arguments:
                 values: ['t', 'f']
        - name: updated_at
          data_type: timestamp
        - name: created_at
          data_type: timestamp



    - name: fct_reviews
      columns:
        - name: listing_id
          tests: 
            - not_null
            - relationships: 
                 arguments:
                  to: ref('dim_listings_cleansed')
                  field: listing_id
        - name: reviewer_name
          tests:
            - not_null
        - name: review_sentiment
          tests:
            - accepted_values:
                arguments:
                  values: ['negative', 'positive', 'neutral']
        - name: minimum_nights
          tests:
            - positive_values






